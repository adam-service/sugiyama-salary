<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>業務委託報酬管理 - 杉山</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#2B5797;--primary-light:#3a6db5;--primary-dark:#1e3f6e;
  --accent:#E8913A;--accent-light:#f0a85c;
  --green:#27864a;--green-light:#34a85c;
  --red:#c0392b;--red-light:#e74c3c;
  --bg:#f0f2f5;--card:#fff;--text:#2c3e50;--text-light:#7f8c8d;
  --border:#e0e3e8;--shadow:0 2px 8px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',Meiryo,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overflow-x:hidden}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:14px 16px 10px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.header h1{font-size:15px;font-weight:600;opacity:.9;letter-spacing:.5px}
.header .subtitle{font-size:12px;opacity:.7;margin-top:2px}
.month-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px}
.month-nav button{background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-nav button:active{background:rgba(255,255,255,.35)}
.month-nav .month-label{font-size:18px;font-weight:700;min-width:140px;text-align:center}
.tabs{position:sticky;top:78px;z-index:99;display:flex;background:#fff;border-bottom:2px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tabs button{flex:1;padding:12px 4px;border:none;background:none;font-size:13px;font-weight:600;color:var(--text-light);cursor:pointer;position:relative;transition:.2s}
.tabs button.active{color:var(--primary)}
.tabs button.active::after{content:'';position:absolute;bottom:-2px;left:10%;width:80%;height:3px;background:var(--primary);border-radius:2px}
.main{max-width:600px;margin:0 auto;padding:12px 12px 100px}
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.summary-item{background:var(--bg);border-radius:8px;padding:10px;text-align:center}
.summary-item .label{font-size:11px;color:var(--text-light);margin-bottom:4px}
.summary-item .value{font-size:18px;font-weight:800}
.summary-item .value.positive{color:var(--green)}
.summary-item .value.negative{color:var(--red)}
.summary-item.wide{grid-column:1/-1}
.summary-item.highlight{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff}
.summary-item.highlight .label{color:rgba(255,255,255,.8)}
.summary-item.highlight .value{color:#fff}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;color:#fff;vertical-align:middle}
.badge.adam{background:var(--primary)}
.badge.self{background:var(--green)}
.client-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border-left:4px solid var(--border)}
.client-card.adam{border-left-color:var(--primary)}
.client-card.self{border-left-color:var(--green)}
.client-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.client-name{font-size:15px;font-weight:700}
.client-meta{font-size:11px;color:var(--text-light);margin-bottom:8px}
.session-row{display:flex;align-items:center;justify-content:space-between}
.session-controls{display:flex;align-items:center;gap:8px}
.session-controls button{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:#fff;font-size:22px;font-weight:700;color:var(--primary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.session-controls button:active:not(:disabled){background:var(--primary);color:#fff;border-color:var(--primary)}
.session-controls button.minus{color:var(--red)}
.session-controls button.minus:active:not(:disabled){background:var(--red);border-color:var(--red)}
.session-controls button:disabled{opacity:.3;cursor:not-allowed}
.session-controls .count{font-size:24px;font-weight:800;min-width:36px;text-align:center}
.session-reward{text-align:right}
.session-reward .amount{font-size:16px;font-weight:700}
.session-reward .amount.positive{color:var(--green)}
.session-reward .amount.negative{color:var(--red)}
.session-reward .unit-price{font-size:11px;color:var(--text-light)}
.room-select{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.room-btn{font-size:11px;padding:4px 10px;border-radius:16px;border:1.5px solid var(--border);background:#fff;color:var(--text-light);cursor:pointer;transition:.15s}
.room-btn.active{border-color:var(--primary);background:var(--primary);color:#fff}
.room-btn:active{opacity:.7}
.ticket-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:6px 10px;background:var(--bg);border-radius:8px;font-size:12px}
.ticket-bar .ticket-label{color:var(--text-light)}
.ticket-bar .ticket-count{font-weight:800;font-size:14px}
.ticket-bar .ticket-count.zero{color:var(--red)}
.ticket-bar .ticket-add{margin-left:auto;background:var(--primary);color:#fff;border:none;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer}
.ticket-bar .ticket-add:active{opacity:.7}
.ticket-progress{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:0 6px}
.ticket-progress .fill{height:100%;background:var(--green);border-radius:3px;transition:.3s}
.ticket-progress .fill.warn{background:var(--accent)}
.ticket-progress .fill.empty{background:var(--red)}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;transition:.15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#fff}
.btn-accent{background:var(--accent);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:#fff;color:var(--primary);border:2px solid var(--primary)}
.btn-lock{background:var(--green);color:#fff}
.btn-unlock{background:var(--accent);color:#fff}
.btn+.btn{margin-top:8px}
.btn-sm{padding:8px 16px;font-size:13px;width:auto;display:inline-block}
input,select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;background:#fff;color:var(--text);-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(43,87,151,.12)}
label{display:block;font-size:12px;font-weight:600;color:var(--text-light);margin-bottom:4px}
.form-group{margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lock-banner{background:linear-gradient(135deg,var(--green),var(--green-light));color:#fff;padding:12px 16px;border-radius:10px;text-align:center;margin-bottom:12px;font-size:13px;font-weight:600}
.lock-banner .icon{font-size:20px;display:block;margin-bottom:4px}
.report-table{width:100%;border-collapse:collapse;font-size:13px}
.report-table th{background:var(--primary);color:#fff;padding:8px 6px;text-align:center;font-weight:600;font-size:11px}
.report-table td{padding:8px 6px;border-bottom:1px solid var(--border);text-align:center}
.report-table tr:last-child td{border-bottom:none}
.report-table .total-row{background:var(--bg);font-weight:700}
.report-table .name-col{text-align:left;font-weight:600}
.section-title{font-size:13px;font-weight:700;color:var(--text-light);margin:16px 0 8px;padding-left:4px}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:14px}
.lock-screen{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,var(--primary-dark),var(--primary));display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
.lock-screen.hidden{display:none}
.lock-title{font-size:18px;font-weight:700;margin-bottom:8px}
.lock-subtitle{font-size:13px;opacity:.7;margin-bottom:24px}
.pin-dots{display:flex;gap:12px;margin-bottom:24px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.5);transition:.2s}
.pin-dot.filled{background:#fff;border-color:#fff}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:10px}
.pin-key{width:72px;height:56px;border:none;border-radius:12px;background:rgba(255,255,255,.15);color:#fff;font-size:24px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.pin-key:active{background:rgba(255,255,255,.3)}
.pin-key.del{font-size:14px;font-weight:700}
.pin-key.empty{background:transparent;cursor:default}
.pin-error{color:#ff6b6b;font-size:13px;min-height:20px;margin-top:12px;text-align:center}
.role-switch{margin-top:20px;display:flex;gap:10px}
.role-switch button{padding:8px 20px;border-radius:20px;border:1.5px solid rgba(255,255,255,.4);background:transparent;color:rgba(255,255,255,.7);font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.role-switch button.active{background:rgba(255,255,255,.2);border-color:#fff;color:#fff}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.25s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:20px 16px 32px;transform:translateY(100%);transition:.3s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-header h2{font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.delete-zone{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.hidden{display:none!important}
@media(min-width:600px){.pin-pad{gap:12px}.pin-key{width:80px;height:60px}}
.tax-detail{font-size:12px;color:var(--text-light);margin-top:4px}
.custom-room-input{width:80px;padding:4px 8px;font-size:13px;display:inline-block;text-align:right;border-radius:6px}
.settings-section{margin-bottom:20px}
.settings-section h3{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--border)}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-row .label{color:var(--text-light)}
.info-row .val{font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}
.course-list{margin-top:8px}
.course-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.course-item:last-child{border-bottom:none}
.course-del{color:var(--red);font-size:18px;cursor:pointer;padding:4px 8px;border:none;background:none}
.btn-invoice{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff}
/* Sync status */
.sync-status{display:flex;align-items:center;gap:6px;margin-top:4px}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sync-dot.online{background:#2ecc71}
.sync-dot.syncing{background:#f39c12;animation:pulse .8s infinite}
.sync-dot.offline{background:#95a5a6}
.sync-dot.error{background:#e74c3c}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-text{font-size:11px;opacity:.8}
/* Setup overlay */
.setup-overlay{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.setup-overlay.open{opacity:1;pointer-events:all}
.setup-box{background:#fff;border-radius:16px;padding:28px 24px;max-width:440px;width:90%;color:var(--text)}
.setup-box h2{font-size:18px;margin-bottom:8px;color:var(--primary)}
.setup-box p{font-size:13px;color:var(--text-light);margin-bottom:16px;line-height:1.5}
.setup-box input{margin-bottom:12px}
.setup-box button{width:100%;padding:12px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.setup-box button:disabled{opacity:.5}
.setup-error{color:var(--red);font-size:12px;margin-top:8px;min-height:16px;white-space:pre-wrap}
/* Loading overlay */
.loading-overlay{position:fixed;inset:0;z-index:9997;background:rgba(255,255,255,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:15px;color:var(--text);opacity:0;pointer-events:none;transition:.2s}
.loading-overlay.show{opacity:1;pointer-events:all}
/* Invoice template (hidden, used for PDF rendering) — all table-based for html2canvas reliability */
#invoiceContainer{position:fixed;left:-9999px;top:0;z-index:-1}
#invoicePage{width:794px;height:1123px;background:#fff;font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif;color:#1a1a1a;padding:0;overflow:hidden}
</style>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
</head>
<body>

<!-- Lock Screen -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-title">業務委託報酬管理</div>
  <div class="lock-subtitle" id="lockRole">杉山</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinInput('1')">1</button>
    <button class="pin-key" onclick="pinInput('2')">2</button>
    <button class="pin-key" onclick="pinInput('3')">3</button>
    <button class="pin-key" onclick="pinInput('4')">4</button>
    <button class="pin-key" onclick="pinInput('5')">5</button>
    <button class="pin-key" onclick="pinInput('6')">6</button>
    <button class="pin-key" onclick="pinInput('7')">7</button>
    <button class="pin-key" onclick="pinInput('8')">8</button>
    <button class="pin-key" onclick="pinInput('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinInput('0')">0</button>
    <button class="pin-key del" onclick="pinDelete()">&#9003;</button>
  </div>
  <div class="pin-error" id="pinError"></div>
  <div class="role-switch">
    <button id="roleTrainer" class="active" onclick="switchRole('trainer')">杉山</button>
    <button id="roleAdmin" onclick="switchRole('admin')">管理者</button>
  </div>
</div>

<!-- Header -->
<div class="header" id="appHeader">
  <h1 id="headerTitle">業務委託報酬管理</h1>
  <div class="subtitle" id="headerSubtitle">杉山</div>
  <div class="sync-status"><span class="sync-dot offline" id="syncDot"></span><span class="sync-text" id="syncText">ローカル</span></div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-label" id="monthLabel"></div>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs" id="tabBar">
  <button class="active" onclick="switchTab('input')">入力</button>
  <button onclick="switchTab('report')">レポート</button>
  <button onclick="switchTab('clients')">ゲスト</button>
  <button id="tabSettings" class="hidden" onclick="switchTab('settings')">設定</button>
</div>

<!-- Main -->
<div class="main">
  <div class="tab-content active" id="tabInput">
    <div id="lockBanner"></div>
    <div class="card" id="summaryCard"></div>
    <div id="clientList"></div>
    <div id="lockButton"></div>
    <button class="btn btn-outline" style="margin-top:12px" onclick="openAddClient()">＋ ゲストを追加</button>
  </div>
  <div class="tab-content" id="tabReport"></div>
  <div class="tab-content" id="tabClients"></div>
  <div class="tab-content" id="tabSettingsContent"></div>
</div>

<!-- API URL Setup -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <h2>クラウド接続 初期設定</h2>
    <p>Google Apps ScriptのウェブアプリURLを入力してください。<br>管理者からURLを受け取ってください。</p>
    <input id="apiUrlInput" placeholder="https://script.google.com/macros/s/xxxx/exec" type="url">
    <button id="apiUrlSaveBtn" onclick="saveApiUrl()">接続テスト＆保存</button>
    <div class="setup-error" id="setupError"></div>
    <div style="margin-top:12px;text-align:center"><a href="#" onclick="document.getElementById('setupOverlay').classList.remove('open');return false" style="font-size:13px;color:var(--text-light)">スキップ（ローカルのみ）</a></div>
  </div>
</div>
<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay"><div>読み込み中...</div></div>

<!-- Invoice (hidden, for PDF rendering) -->
<div id="invoiceContainer"><div id="invoicePage"></div></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
</div>

<script>
/* ===== Storage ===== */
const SK='sugiyama_salary_v1';
const API_URL_KEY='sugiyama_api_url';
let API_URL=localStorage.getItem(API_URL_KEY)||'https://script.google.com/macros/s/AKfycbyxHnZym4r4qGsCtmnuTYcM8xMw1tcbDEfW3sW6-K9lY2dSeOdIZlrzuSL1Rba75DCR/exec';
let saveTimer=null;
const SAVE_DELAY=1500;

/* ===== インボイス制度 経過措置 自動判定 ===== */
function getInvoiceTransitionRate(dateOrMk){
  // dateOrMk: Date object or 'YYYY-MM' string
  // 免税事業者への支払いは税込扱い。消費税相当額 = 支払額 × 10/110
  // 控除不可額 = 消費税相当額 × 控除不可割合(ratio)
  let d;
  if(typeof dateOrMk==='string'){const[y,m]=dateOrMk.split('-');d=new Date(parseInt(y),parseInt(m)-1,1)}
  else{d=dateOrMk||new Date()}
  const p1end=new Date(2026,8,30); // 2026-09-30: 第1期間終了
  const p2end=new Date(2029,8,30); // 2029-09-30: 第2期間終了
  if(d<=p1end)return{ratio:0.2,label:'控除不可20%',period:'経過措置 第1期間（〜2026/9）',detail:'仕入税額控除80% → 控除不可20% → 税込額×10/110×20%'};
  if(d<=p2end)return{ratio:0.5,label:'控除不可50%',period:'経過措置 第2期間（2026/10〜2029/9）',detail:'仕入税額控除50% → 控除不可50% → 税込額×10/110×50%'};
  return{ratio:1.0,label:'控除不可100%',period:'経過措置終了（2029/10〜）',detail:'仕入税額控除0% → 控除不可100% → 税込額×10/110×100%'};
}

function defaultData(){
  return{
  config:{masterPin:'0000',trainerPin:'0000',trainerName:'杉山',
    roomFees:{adam_aden:8000,sub:5000},
    taxDeductionRate:2,taxRateAuto:true},
  clients:[],
  sessions:{},
  lockedMonths:{},
  specialAllowances:{}
}}
let D,isMaster=false,currentMonth,pinBuffer='',loginRole='trainer';

function migrateData(d){
  if(!d.config)d.config=defaultData().config;
  // PINが数値として保存されゼロ落ちした場合の復元
  if(d.config.masterPin!=null)d.config.masterPin=String(d.config.masterPin).padStart(4,'0');
  if(d.config.trainerPin!=null)d.config.trainerPin=String(d.config.trainerPin).padStart(4,'0');
  if(!d.config.roomFees)d.config.roomFees={adam_aden:8000,sub:5000};
  if(d.config.taxDeductionRate===undefined)d.config.taxDeductionRate=2;
  // Auto mode flag
  if(d.config.taxRateAuto!==false){
    d.config.taxRateAuto=true;
  }
  if(!d.lockedMonths)d.lockedMonths={};
  if(!d.specialAllowances)d.specialAllowances={};
  if(!d.clients)d.clients=[];
  if(!d.sessions)d.sessions={};
  // 月キーが日付文字列に壊れている場合をYYYY-MM形式に修復
  function fixMonthKeys(obj){
    if(!obj)return obj;
    const fixed={};
    Object.keys(obj).forEach(k=>{
      let mk=k;
      if(!/^\d{4}-\d{2}$/.test(k)){
        const dt=new Date(k);
        if(!isNaN(dt.getTime()))mk=dt.toISOString().slice(0,7);
      }
      // 同じ月キーが既にあればマージ
      if(fixed[mk])Object.assign(fixed[mk],obj[k]);
      else fixed[mk]=obj[k];
    });
    return fixed;
  }
  d.sessions=fixMonthKeys(d.sessions);
  d.lockedMonths=fixMonthKeys(d.lockedMonths);
  d.specialAllowances=fixMonthKeys(d.specialAllowances);
  d.clients.forEach(c=>{if(!c.courses)c.courses=[]});
}
function load(){
  try{const s=localStorage.getItem(SK);D=s?JSON.parse(s):defaultData()}

}

/* ===== Cloud Sync ===== */
function updateSyncStatus(state,text){
  const dot=document.getElementById('syncDot');
  const txt=document.getElementById('syncText');
  if(!dot||!txt)return;
  dot.className='sync-dot '+state;
  txt.textContent=text||{online:'接続済み',syncing:'同期中...',offline:'ローカル',error:'接続エラー'}[state]||'';
}
async function fetchFromCloud(){
  if(!API_URL)return null;
  updateSyncStatus('syncing','読み込み中...');
  try{
    const res=await fetch(API_URL+'?action=getData');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    updateSyncStatus('online','接続済み');
    return data;
  }catch(e){
    console.error('Cloud fetch error:',e);
    updateSyncStatus('error','接続エラー');
    return null;
  }
}
async function saveToCloud(){
  if(!API_URL)return false;
  updateSyncStatus('syncing','保存中...');
  try{
    const res=await fetch(API_URL+'?action=saveData',{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(D),
      redirect:'follow'
    });
    // GAS redirects may return opaque response; check if we got valid JSON
    let result;
    try{result=await res.json()}catch(e){
      // If redirect succeeded but response is opaque, treat as success
      if(res.ok||res.type==='opaque'||res.redirected){
        updateSyncStatus('online','保存完了');
        setTimeout(()=>updateSyncStatus('online','接続済み'),2000);
        return true;
      }
      throw new Error('HTTP '+res.status);
    }
    if(result.error)throw new Error(result.error);
    updateSyncStatus('online','保存完了');
    setTimeout(()=>updateSyncStatus('online','接続済み'),2000);
    return true;
  }catch(e){
    console.error('Cloud save error:',e);
    updateSyncStatus('error','保存失敗');
    return false;
  }
}
function save(){
  saveLocal();
  if(API_URL){
    if(saveTimer)clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>saveToCloud(),SAVE_DELAY);
  }
}
async function syncFromCloud(){
  showLoading('サーバーからデータを取得中...');
  const data=await fetchFromCloud();
  if(data){
    migrateData(data);
    const cloudHasClients=data.clients&&data.clients.length>0;
    const localHasClients=D.clients&&D.clients.length>0;
    if(cloudHasClients){
      // 旧GASコードがspecialAllowancesを保存しない場合に備え、ローカルのデータを保護
      if(D.specialAllowances&&Object.keys(D.specialAllowances).length>0&&(!data.specialAllowances||Object.keys(data.specialAllowances).length===0)){
        data.specialAllowances=D.specialAllowances;
      }
      D=data;saveLocal();render();alert('最新データを取得しました');
    }else if(localHasClients){
      alert('クラウドにゲストデータがありません。ローカルデータを維持し、クラウドへ保存します。');
      saveToCloud();render();
    }else{
      D=data;saveLocal();render();alert('最新データを取得しました');
    }
  }else{alert('取得に失敗しました。ローカルデータを使用します。');}
  hideLoading();
}
function showLoading(msg){const o=document.getElementById('loadingOverlay');o.textContent=msg||'読み込み中...';o.classList.add('show')}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show')}

/* ===== API URL Setup ===== */
async function saveApiUrl(){
  const url=document.getElementById('apiUrlInput').value.trim();
  if(!url){document.getElementById('setupError').textContent='URLを入力してください';return}
  const btn=document.getElementById('apiUrlSaveBtn');
  btn.disabled=true;btn.textContent='接続テスト中...';
  document.getElementById('setupError').textContent='';
  try{
    const res=await fetch(url+'?action=getData');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    API_URL=url;localStorage.setItem(API_URL_KEY,url);
    migrateData(data);D=data;saveLocal();
    document.getElementById('setupOverlay').classList.remove('open');
    updateSyncStatus('online','接続済み');
    render();
  }catch(e){
    document.getElementById('setupError').textContent='接続失敗: '+e.message;
  }finally{btn.disabled=false;btn.textContent='接続テスト＆保存'}
}
function changeApiUrl(){
  document.getElementById('apiUrlInput').value=API_URL||'';
  document.getElementById('setupError').textContent='';
  document.getElementById('setupOverlay').classList.add('open');
}

/* ===== PIN Auth ===== */
function switchRole(r){
  loginRole=r;pinBuffer='';updatePinDots();
  document.getElementById('pinError').textContent='';
  document.getElementById('roleTrainer').classList.toggle('active',r==='trainer');
  document.getElementById('roleAdmin').classList.toggle('active',r==='admin');
  document.getElementById('lockRole').textContent=r==='admin'?'管理者モード':D.config.trainerName;
}
function pinInput(n){
  if(pinBuffer.length>=4)return;
  pinBuffer+=n;updatePinDots();
  if(pinBuffer.length===4)setTimeout(checkPin,150);
}
function pinDelete(){pinBuffer=pinBuffer.slice(0,-1);updatePinDots();document.getElementById('pinError').textContent=''}
function updatePinDots(){
  const dots=document.querySelectorAll('#pinDots .pin-dot');
  dots.forEach((d,i)=>d.classList.toggle('filled',i<pinBuffer.length));
}
function checkPin(){
  const target=loginRole==='admin'?D.config.masterPin:D.config.trainerPin;
  if(pinBuffer===target){
    isMaster=loginRole==='admin';
    document.getElementById('lockScreen').classList.add('hidden');
    initApp();
  }else{
    document.getElementById('pinError').textContent='PINが違います';
    pinBuffer='';updatePinDots();
  }
}
async function logout(){
  isMaster=false;pinBuffer='';updatePinDots();
  document.getElementById('lockScreen').classList.remove('hidden');
  document.getElementById('pinError').textContent='';
  switchRole('trainer');
  // クラウドから最新データを取得（バックグラウンド）
  if(API_URL){
    const data=await fetchFromCloud();
    if(data){
      migrateData(data);
      const cloudHasClients=data.clients&&data.clients.length>0;
      if(cloudHasClients){D=data;saveLocal();}
    }
  }
}

/* ===== Month Nav ===== */
function monthKey(d){return d.toISOString().slice(0,7)}
function monthDisplay(mk){const[y,m]=mk.split('-');return y+'年'+parseInt(m)+'月'}
function changeMonth(delta){
  const d=new Date(currentMonth+'-01');
  d.setMonth(d.getMonth()+delta);
  currentMonth=monthKey(d);
  render();
}
function isLocked(mk){return!!D.lockedMonths[mk]}

/* ===== Room Helpers ===== */
function roomLabel(r){return r==='adam_aden'?'ADAM/ADEN':r==='sub'?'SUB':'カスタム'}
function getRoomFee(room,customFee){
  if(room==='custom')return customFee||0;
  return D.config.roomFees[room]||0;
}
function getSessionData(clientId,mk){
  if(!D.sessions[mk])return null;
  return D.sessions[mk][clientId]||null;
}
function ensureSession(clientId,mk){
  if(!D.sessions[mk])D.sessions[mk]={};
  if(!D.sessions[mk][clientId]){
    const c=D.clients.find(x=>x.id===clientId);
    D.sessions[mk][clientId]={count:0,room:c?c.defaultRoom:'adam_aden',customRoomFee:c?c.customRoomFee:null};
  }
  return D.sessions[mk][clientId];
}

/* ===== Ticket Helpers ===== */
function getTicketInfo(clientId){
  const c=D.clients.find(x=>x.id===clientId);
  if(!c)return{total:0,used:0,remaining:0};
  const total=c.courses.reduce((s,cr)=>s+cr.total,0);
  let used=0;
  Object.keys(D.sessions).forEach(mk=>{
    if(D.sessions[mk][clientId])used+=D.sessions[mk][clientId].count;
  });
  return{total,used,remaining:total-used};
}

/* ===== Calculation ===== */
function calcClientMonth(clientId,mk){
  const c=D.clients.find(x=>x.id===clientId);if(!c)return{count:0,reward:0,cost:0,roomFee:0};
  const s=getSessionData(clientId,mk);
  const count=s?s.count:0;
  if(count===0)return{count:0,reward:0,cost:0,roomFee:0};
  const room=s.room||c.defaultRoom;
  const roomFee=getRoomFee(room,s.customRoomFee!=null?s.customRoomFee:c.customRoomFee);
  if(c.type==='adam'){
    const reward=count*((c.sessionPrice||0)-roomFee);
    return{count,reward,cost:0,roomFee,room,unitReward:(c.sessionPrice||0)-roomFee};
  }else{
    const cost=count*roomFee;
    return{count,reward:0,cost,roomFee,room,unitCost:roomFee};
  }
}
function calcMonth(mk){
  let totalReward=0,totalCost=0,totalSessions=0,activeClients=0;
  const details=[];
  D.clients.forEach(c=>{
    const r=calcClientMonth(c.id,mk);
    if(r.count>0){
      totalReward+=r.reward;totalCost+=r.cost;totalSessions+=r.count;activeClients++;
      details.push({...r,client:c});
    }
  });
  const gross=totalReward-totalCost;
  const sa=D.specialAllowances&&D.specialAllowances[mk]?D.specialAllowances[mk]:{amount:0,memo:''};
  const specialAmount=sa.amount||0;
  const specialMemo=sa.memo||'';
  const subtotal=gross+specialAmount; // 特例手当込みの小計
  // 免税事業者控除: 税込額×10/110×控除不可割合（自動） or 手動%
  let taxDeduction=0,taxLabel='';
  if(subtotal>0){
    if(D.config.taxRateAuto!==false){
      const tr=getInvoiceTransitionRate(mk);
      taxDeduction=Math.floor(subtotal*10/110*tr.ratio);
      taxLabel=tr.label;
    }else{
      taxDeduction=Math.floor(subtotal*D.config.taxDeductionRate/100);
      taxLabel=D.config.taxDeductionRate+'%';
    }
  }
  const net=subtotal-taxDeduction;
  return{totalReward,totalCost,totalSessions,activeClients,gross,taxDeduction,taxLabel,specialAmount,specialMemo,subtotal,net,details};
}

  const sc=document.getElementById('summaryCard');

      <div class="summary-item"><div class="label">① ADAM経由 報酬</div><div class="value positive">¥${calc.totalReward.toLocaleString()}</div></div>

    });

      const tk=getTicketInfo(c.id);

      const canAdd=!hasTickets||tk.remaining>0;
      const pct=hasTickets?Math.min(100,Math.round(tk.used/tk.total*100)):0;
      const fillClass=hasTickets?(tk.remaining===0?'empty':tk.remaining<=2?'warn':''):'';

      <div class="client-card ${c.type}">

          <div class="ticket-progress"><div class="fill ${fillClass}" style="width:${100-pct}%"></div></div>

            <span class="count">${s.count}</span>
            <button onclick="changeCount('${c.id}',1)" ${(locked&&!isMaster)||(!canAdd)?'disabled':''}${!canAdd?' title="チケットがありません"':''}>＋</button>
          </div>
          <div class="session-reward">
            ${isAdam?
              `<div class="amount positive">¥${r.reward.toLocaleString()}</div><div class="unit-price">@¥${((c.sessionPrice||0)-roomFee).toLocaleString()}/回</div>`:
              `<div class="amount negative">${s.count>0?'-':''}¥${r.cost.toLocaleString()}</div><div class="unit-price">@¥${roomFee.toLocaleString()}/回</div>`
            }
          </div>
        </div>
        <div class="room-select">
          <button class="room-btn ${s.room==='adam_aden'?'active':''}" onclick="changeRoom('${c.id}','adam_aden')" ${locked&&!isMaster?'disabled':''}>ADAM/ADEN ¥${D.config.roomFees.adam_aden.toLocaleString()}</button>

          ${s.room==='custom'?`<input type="number" class="custom-room-input" value="${s.customRoomFee||''}" placeholder="金額" onchange="changeCustomRoomFee('${c.id}',this.value)" ${locked&&!isMaster?'disabled':''}>`:''}
        </div>
      </div>`;
    }).join('');
  }

  const lbtn=document.getElementById('lockButton');
  if(locked){
    lbtn.innerHTML=isMaster?`<button class="btn btn-unlock" onclick="toggleLock()">🔓 ${monthDisplay(mk)} の確定を解除</button>`:'';
  }else{
    lbtn.innerHTML=`<button class="btn btn-lock" onclick="toggleLock()">🔒 ${monthDisplay(mk)} を確定する</button>`;
  }
}

/* ===== Actions ===== */
function changeCount(clientId,delta){
  const mk=currentMonth;
  if(isLocked(mk)&&!isMaster){alert('この月は確定済みのため編集できません');return}
  const s=ensureSession(clientId,mk);
  const newCount=s.count+delta;
  if(newCount<0)return;
  // チケット上限チェック（+方向のみ）
  if(delta>0){
    const tk=getTicketInfo(clientId);
    if(tk.total>0&&tk.remaining<=0){
      alert('チケットの残りがありません。\n追加購入してからカウントしてください。');
      return;
    }
  }
  s.count=newCount;
  if(s.count===0){delete D.sessions[mk][clientId];if(Object.keys(D.sessions[mk]).length===0)delete D.sessions[mk]}
  save();render();
}
function changeRoom(clientId,room){
  const mk=currentMonth;
  if(isLocked(mk)&&!isMaster)return;
  const s=ensureSession(clientId,mk);
  s.room=room;
  if(room==='custom'&&s.customRoomFee==null){
    const c=D.clients.find(x=>x.id===clientId);
    s.customRoomFee=c&&c.customRoomFee?c.customRoomFee:0;
  }
  save();render();
}
function changeCustomRoomFee(clientId,val){
  const mk=currentMonth;
  if(isLocked(mk)&&!isMaster)return;
  const s=ensureSession(clientId,mk);
  s.customRoomFee=parseInt(val)||0;
  save();render();
}
function saveSpecialAllowance(){
  const mk=currentMonth;
  const amount=parseInt(document.getElementById('saAmount').value)||0;
  const memo=(document.getElementById('saMemo').value||'').trim();
  if(amount===0&&!memo){
    delete D.specialAllowances[mk];
  }else{
    D.specialAllowances[mk]={amount,memo};
  }
  save();render();
}
function toggleLock(){
  const mk=currentMonth;
  if(isLocked(mk)){
    if(!isMaster){alert('確定解除は管理者のみ可能です');return}
    if(!confirm(monthDisplay(mk)+'の確定を解除しますか？'))return;
    delete D.lockedMonths[mk];
  }else{
    if(!confirm(monthDisplay(mk)+'を確定しますか？\n確定後は管理者のみ編集可能になります。'))return;
    D.lockedMonths[mk]={lockedAt:Date.now()};
  }
  save();render();
}
function unlockMonth(mk){
  if(!confirm(monthDisplay(mk)+'の確定を解除しますか？'))return;
  delete D.lockedMonths[mk];save();render();
}
function updateConfig(key,val){
  if(key==='roomFee_adam_aden')D.config.roomFees.adam_aden=parseInt(val)||0;
  else if(key==='roomFee_sub')D.config.roomFees.sub=parseInt(val)||0;
  else if(key==='taxRate'){D.config.taxDeductionRate=Math.max(0,Math.min(100,parseFloat(val)||0));D.config.taxRateAuto=false;}
  else if(key==='trainerPin')D.config.trainerPin=val;
  else if(key==='masterPin')D.config.masterPin=val;
  save();render();
}

/* ===== Ticket CRUD ===== */
function openAddTicket(clientId){
  const c=D.clients.find(x=>x.id===clientId);if(!c)return;
  const tk=getTicketInfo(clientId);
  let coursesHtml='';
  if(c.courses.length>0){
    coursesHtml='<div style="margin-bottom:14px"><label>購入履歴</label><div class="course-list">';
    c.courses.forEach((cr,i)=>{
      const d=new Date(cr.addedAt);
      coursesHtml+=`<div class="course-item"><span>${d.toLocaleDateString('ja-JP')} — ${cr.total}回</span><button class="course-del" onclick="deleteCourse('${clientId}',${i})" title="削除">×</button></div>`;
    });
    coursesHtml+=`</div><div style="font-size:12px;color:var(--text-light);margin-top:4px">合計 ${tk.total}回購入 ／ ${tk.used}回消化 ／ 残り ${tk.remaining}回</div></div>`;
  }
  const html=`
    <div class="modal-header"><h2>🎫 ${esc(c.name)} — チケット追加</h2><button class="modal-close" onclick="closeModal()">×</button></div>
    ${coursesHtml}
    <div class="form-group"><label>追加する回数</label><input id="tkCount" type="number" placeholder="例: 10" inputmode="numeric" min="1"></div>
    <button class="btn btn-primary" onclick="saveTicket('${clientId}')">追加する</button>`;
  openModal(html);
}
function saveTicket(clientId){
  const c=D.clients.find(x=>x.id===clientId);if(!c)return;
  const count=parseInt(document.getElementById('tkCount').value)||0;
  if(count<=0){alert('1以上の回数を入力してください');return}
  c.courses.push({id:'tk_'+Date.now(),total:count,addedAt:Date.now()});
  save();closeModal();render();
}
function deleteCourse(clientId,idx){
  const c=D.clients.find(x=>x.id===clientId);if(!c)return;
  const cr=c.courses[idx];if(!cr)return;
  if(!confirm(cr.total+'回分のチケットを削除しますか？'))return;
  c.courses.splice(idx,1);
  save();
  // re-open the ticket modal to refresh
  openAddTicket(clientId);
}

function saveNewClient(){

function deleteCourseInEdit(clientId,idx){
  const c=D.clients.find(x=>x.id===clientId);if(!c)return;
  const cr=c.courses[idx];if(!cr)return;
  if(!confirm(cr.total+'回分のチケットを削除しますか？'))return;
  c.courses.splice(idx,1);
  save();openEditClient(clientId);
}
function saveEditClient(id){
  const c=D.clients.find(x=>x.id===id);if(!c)return;
  c.name=document.getElementById('eName').value.trim();
  c.type=document.getElementById('eType').value;
  c.sessionPrice=c.type==='adam'?parseInt(document.getElementById('ePrice').value)||0:0;
  c.defaultRoom=document.getElementById('eRoom').value;
  c.customRoomFee=c.defaultRoom==='custom'?parseInt(document.getElementById('eCustomFee').value)||0:null;
  // 追加チケット
  const newTicket=parseInt(document.getElementById('eNewTicket').value)||0;
  if(newTicket>0)c.courses.push({id:'tk_'+Date.now(),total:newTicket,addedAt:Date.now()});
  save();closeModal();render();
}
function deleteClient(id){
  if(!confirm('このゲストを削除しますか？\nセッションデータも削除されます。'))return;
  D.clients=D.clients.filter(x=>x.id!==id);
  Object.keys(D.sessions).forEach(mk=>{if(D.sessions[mk][id])delete D.sessions[mk][id]});
  save();closeModal();render();
}

    </div>
  `;

  // Render to PDF
  const container=document.getElementById('invoiceContainer');
  container.style.left='0';
  container.style.position='absolute';

  html2canvas(page,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false}).then(canvas=>{
    container.style.left='-9999px';
    container.style.position='fixed';
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const imgData=canvas.toDataURL('image/jpeg',0.95);
    pdf.addImage(imgData,'JPEG',0,0,210,297);
    pdf.save('請求書_杉山佑太_'+mk+'.pdf');
  }).catch(err=>{
    container.style.left='-9999px';
    container.style.position='fixed';
    alert('PDF生成に失敗しました: '+err.message);
  });
}

/* ===== Export/Import ===== */
function exportData(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='sugiyama_salary_backup_'+currentMonth+'.json';a.click();
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const imported=JSON.parse(ev.target.result);
      if(!imported.config||!imported.clients){alert('無効なデータです');return}
      if(!confirm('現在のデータを上書きしますか？'))return;
      D=imported;save();render();alert('インポートしました');
    }catch(err){alert('ファイルの読み込みに失敗しました')}
  };
  reader.readAsText(f);e.target.value='';
}

/* ===== Modal ===== */
function openModal(html){
  document.getElementById('modalContent').innerHTML=html;
  const ov=document.getElementById('modalOverlay');
  ov.classList.add('show');
  ov.onmousedown=function(e){if(e.target===ov)closeModal()};
}
function closeModal(){
  const ov=document.getElementById('modalOverlay');
  ov.classList.remove('show');
  ov.onmousedown=null;
}

/* ===== Tab ===== */
function switchTab(tab){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  const tabMap={input:'tabInput',report:'tabReport',clients:'tabClients',settings:'tabSettingsContent'};
  document.getElementById(tabMap[tab]).classList.add('active');
  const btns=document.querySelectorAll('.tabs button');
  const idx={input:0,report:1,clients:2,settings:3}[tab];
  if(btns[idx])btns[idx].classList.add('active');
  render();
}

/* ===== Util ===== */
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* ===== Init ===== */
function initApp(){
  document.getElementById('headerSubtitle').textContent=isMaster?'管理者モード':D.config.trainerName;
  document.getElementById('tabSettings').classList.toggle('hidden',!isMaster);
  render();
}
load();
currentMonth=monthKey(new Date());
document.getElementById('monthLabel').textContent=monthDisplay(currentMonth);

// 起動時にクラウドからデータ取得（API URL未設定ならセットアップ表示）
(async function boot(){
  if(API_URL){
    const data=await fetchFromCloud();
    if(data){
      migrateData(data);
      // クラウドにゲストがいればクラウド優先、クラウドが空ならローカル優先
      const cloudHasClients=data.clients&&data.clients.length>0;
      const localHasClients=D.clients&&D.clients.length>0;
      if(cloudHasClients){
        // クラウドが最新 → 採用
        D=data;saveLocal();
      }else if(localHasClients){
        // クラウドが空でローカルにデータあり → ローカルを維持しクラウドへ保存
        console.log('Cloud is empty but local has data — pushing local to cloud');
        saveToCloud();
      }else{
        // 両方空 → クラウドデータを採用（設定だけでも同期）
        D=data;saveLocal();
      }
    }
  }else{
    // 初回はセットアップオーバーレイを表示
    document.getElementById('setupOverlay').classList.add('open');
  }
})();
</script>
